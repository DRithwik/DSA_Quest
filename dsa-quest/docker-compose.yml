version: '3.8'

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: rithwik
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dsa_quest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://rithwik:password@postgres:5432/dsa_quest?schema=public
      - MONGODB_URI=mongodb://mongodb:27017/dsa_quest
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - postgres
      - mongodb
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Mount Docker socket for sandbox

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  mongodata:
